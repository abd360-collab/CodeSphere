version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: editor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      
  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"  # <--- This opens the window for the Host Nginx
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  pgdata: